<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: #fff;
}

/* CONTAINER MOBILE FIRST */
.container {
  width: 100%;
  min-height: 100dvh;
  background: #1e1e1e;
  padding: 25px 18px;
  box-sizing: border-box;
}

/* TITULO */
h2 {
  text-align: center;
  margin-bottom: 25px;
}

/* LABEL */
label {
  font-size: 13px;
  margin-top: 12px;
  display: block;
  opacity: 0.8;
}

/* INPUTS GRANDES (TOQUE) */
input, select {
  width: 100%;
  padding: 16px;
  margin-top: 6px;
  border-radius: 14px;
  border: none;
  background: #2a2a2a;
  color: #fff;
  font-size: 16px;
}

/* BOTÃO GRANDE */
button {
  width: 100%;
  padding: 18px;
  margin-top: 25px;
  border-radius: 16px;
  border: none;
  background: #FFD600;
  font-weight: bold;
  font-size: 17px;
}

/* MSG */
#msg {
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
}

/* DESKTOP */
@media (min-width: 768px) {
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    max-width: 420px;
    min-height: auto;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }
}
</style>

<div class="container">
  <h2>🚀 Criar Conta</h2>

  <label>Nome</label>
  <input id="nome" placeholder="Seu nome completo">

  <label>Email</label>
  <input id="email" type="email" placeholder="Seu email">

  <label>Senha</label>
  <input id="senha" type="password" placeholder="Crie uma senha">

  <label>Tipo de conta</label>
  <select id="tipo">
    <option value="cliente">Cliente</option>
    <option value="marido">Profissional</option>
  </select>

  <button onclick="cad()">Cadastrar</button>

  <p id="msg"></p>
</div>

<script>
async function cad(){
  const nomeValue = nome.value.trim();
  const emailValue = email.value.trim();
  const senhaValue = senha.value;
  const tipoValue = tipo.value;

  const msg = document.getElementById("msg");

  if(!nomeValue || !emailValue || !senhaValue){
    msg.innerText = "⚠️ Preencha todos os campos";
    msg.style.color = "red";
    return;
  }

  if(senhaValue.length < 4){
    msg.innerText = "⚠️ Senha muito curta";
    msg.style.color = "red";
    return;
  }

  try {
    const r = await fetch("https://batti-backend.onrender.com/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        nome: nomeValue,
        email: emailValue,
        senha: senhaValue,
        tipo: tipoValue
      })
    });

    const data = await r.json();

    if(!r.ok){
      msg.innerText = "❌ " + (data.erro || "Erro ao cadastrar");
      msg.style.color = "red";
      return;
    }

    msg.innerText = "✅ Conta criada!";
    msg.style.color = "#FFD600";

    setTimeout(() => {
      location.href = "login.html";
    }, 1200);

  } catch {
    msg.innerText = "❌ Servidor offline";
    msg.style.color = "red";
  }
}
</script>
