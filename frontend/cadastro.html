<link rel="stylesheet" href="style.css">
<style>
  #msg {
    margin-top: 10px;
  }
</style>

<div class="container">
  <h2>Criar Conta</h2>

  <label for="nome">Nome</label>
  <input id="nome" placeholder="Seu nome completo">

  <label for="email">Email</label>
  <input id="email" type="email" placeholder="Seu email">

  <label for="senha">Senha</label>
  <input id="senha" type="password" placeholder="Crie uma senha">

  <label for="tipo">Tipo de conta</label>
  <select id="tipo">
    <option value="cliente">Cliente</option>
    <option value="marido">Profissional</option>
  </select>

  <button onclick="cad()">Cadastrar</button>

  <p id="msg"></p>
</div>

<script>
async function cad(){
  const nomeValue = document.getElementById("nome").value.trim();
  const emailValue = document.getElementById("email").value.trim();
  const senhaValue = document.getElementById("senha").value;
  const tipoValue = document.getElementById("tipo").value;

  const msg = document.getElementById("msg");

  // 🔎 VALIDAÇÃO
  if(!nomeValue || !emailValue || !senhaValue){
    msg.innerText = "⚠️ Preencha todos os campos";
    msg.style.color = "red";
    return;
  }

  if(senhaValue.length < 4){
    msg.innerText = "⚠️ A senha deve ter pelo menos 4 caracteres";
    msg.style.color = "red";
    return;
  }

  try {
    const r = await fetch("https://batti-backend.onrender.com/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        nome: nomeValue,
        email: emailValue,
        senha: senhaValue,
        tipo: tipoValue
      })
    });

    const data = await r.json();

    // 🔥 TRATAMENTO REAL DO ERRO
    if(!r.ok){
      msg.innerText = "❌ " + (data.erro || "Erro ao cadastrar");
      msg.style.color = "red";
      return;
    }

    // ✅ SUCESSO
    msg.innerText = "✅ Conta criada com sucesso!";
    msg.style.color = "#FFD600";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (e) {
    msg.innerText = "❌ Servidor offline ou erro de conexão";
    msg.style.color = "red";
  }
}
</script>
